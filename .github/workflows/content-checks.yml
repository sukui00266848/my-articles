name: Content Checks
on: [pull_request]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install deps
        run: npm ci
      - name: Sentence length check
        run: npm run check:sentences
      - name: Generate missing image metas
        run: npm run gen:image-meta
      - name: Contrast check
        run: npm run check:contrast
      - name: Generate sentence report (JSON + MD)
        run: node scripts/generate-sentence-report.js . 30
        continue-on-error: true
      - name: Upload sentence report artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentence-report
          path: reports/sentence-report.json
